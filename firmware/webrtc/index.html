<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rover Camera Stream</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; }
        video { width: 90%; max-width: 600px; border: 2px solid #555; border-radius: 8px; margin-top: 20px; }
        button { 
            padding: 15px 30px; font-size: 1.2rem; background: #007bff; 
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;
        }
        button:active { background: #0056b3; }
        #status { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Rover Video Uplink</h1>
    <video id="video" autoplay playsinline muted></video>
    <br>
    <button id="startBtn">Start Streaming</button>
    <div id="status">Ready</div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        async function start() {
            statusDiv.innerText = "Requesting camera...";
            try {
                // No STUN for localhost to avoid privacy-block delays
                const pc = new RTCPeerConnection({ iceServers: [] });

                pc.onicecandidate = async (event) => {
                    if (event.candidate) {
                        console.log("ICE candidate:", event.candidate);
                        await fetch('/candidate', {
                            method: 'POST',
                            body: JSON.stringify(event.candidate),
                            headers: { 'Content-Type': 'application/json' }
                        });
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                stream.getTracks().forEach(track => pc.addTrack(track, stream));

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                statusDiv.innerText = "Connecting...";

                // Send Offer
                const response = await fetch('/offer', {
                    method: 'POST',
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type
                    }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const answer = await response.json();
                await pc.setRemoteDescription(answer);

                // HACK: If the browser found no candidates, manually tell the server to look at localhost
                // This bypasses many 'Ungoogled' privacy restrictions for local testing
                setTimeout(async () => {
                    if (pc.iceGatheringState !== 'complete' || pc.localDescription.sdp.indexOf('a=candidate') === -1) {
                        console.log("Injecting fallback localhost candidate...");
                        await fetch('/candidate', {
                            method: 'POST',
                            body: JSON.stringify({
                                candidate: "candidate:0 1 UDP 2122194687 127.0.0.1 9 typ host",
                                sdpMid: "0",
                                sdpMLineIndex: 0,
                                component: 1,
                                foundation: "0",
                                ip: "127.0.0.1",
                                port: 9, // dummy port, WebRTC will hunt
                                priority: 2122194687,
                                protocol: "udp",
                                type: "host"
                            }),
                            headers: { 'Content-Type': 'application/json' }
                        });
                    }
                }, 500);

                statusDiv.innerText = "Streaming Active";
                startBtn.style.display = 'none';

            } catch (err) {
                statusDiv.innerText = "Error: " + err.message;
            }
        }

        startBtn.onclick = start;
    </script>
</body>
</html>
